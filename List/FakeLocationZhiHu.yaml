  # ---------------------------------------------
  # [IP归属地] 知乎 - 自定义窄规则版
  # 目标：
  # 1. 尽量只影响“归属地判断”
  # 2. 不接管知乎主站 / API / 静态资源
  # 3. 主流量继续交给 CN 社媒 / 回国规则
  # ---------------------------------------------

  # 先拦截常见的本地/运营商 DNS 探测
  - DOMAIN-KEYWORD,httpdns,REJECT-DROP
  - DOMAIN-KEYWORD,httpsdns,REJECT-DROP
  - DOMAIN-KEYWORD,app-analytics-services,REJECT-DROP

  # ---------------------------------------------
  # 候选归属地 IP
  # 说明：
  # - 这里只保留上游 FakeLocation 文件里出现过的候选 IP
  # - 不引入 zhihu.com / zhimg.com 整站域名
  # - 用最小范围实验，避免知乎主体流量被带去美国
  # ---------------------------------------------
  - IP-CIDR,43.152.182.14/32,no-resolve
  - IP-CIDR,43.152.129.54/32,no-resolve
  - IP-CIDR,43.152.134.28/32,no-resolve
  - IP-CIDR,120.92.107.7/32,no-resolve

  # ---------------------------------------------
  # 这个网段范围偏大，先默认不要开
  # 如果前面几个 /32 都无法让归属地变成美国，再单独测试它
  # ---------------------------------------------
  # - IP-CIDR,103.41.167.0/24,no-resolve
